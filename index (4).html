<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة توليد تقارير الهندسة القيمية | EXPRO</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#0B4F6C;--pl:#1A7FA8;--pd:#073B51;--ac:#C8A415;--al:#E0BE2A;--bg:#F4F6F9;--card:#FFF;--tx:#1B1F2A;--tx2:#5A6478;--bd:#DCE2EC;--ok:#0D9668;--wn:#D97706;--no:#DC2626;--sh:0 4px 20px rgba(11,79,108,.07);--r:10px;--rl:16px;--t:.2s ease}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;line-height:1.7}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--pl);border-radius:3px}

.hd{background:linear-gradient(135deg,var(--pd),var(--p) 60%,var(--pl));position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.18)}
.hd-top{max-width:1200px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.br{display:flex;align-items:center;gap:14px}
.br-logo{width:44px;height:44px;background:var(--ac);border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:14px;color:var(--pd);font-family:'Cairo',sans-serif;box-shadow:0 3px 10px rgba(200,164,21,.35);line-height:1.1;text-align:center}
.br h1{color:#fff;font-size:19px;font-weight:800;font-family:'Cairo',sans-serif}
.br-sub{color:rgba(255,255,255,.6);font-size:11px}
.hd-tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:5px 14px;border-radius:16px;font-size:11px}

.sb{background:rgba(0,0,0,.12);padding:0 28px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sb::-webkit-scrollbar{height:0}
.sb-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:2px;min-width:max-content}
.sp{display:flex;align-items:center;gap:7px;padding:10px 14px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.35);cursor:pointer;transition:var(--t);white-space:nowrap;border-radius:6px;border:none;background:none;font-family:'Tajawal',sans-serif}
.sp:hover{color:rgba(255,255,255,.6)}.sp.a{color:#fff;background:rgba(255,255,255,.12);font-weight:700}.sp.d{color:var(--al)}
.sd{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:800;border:2px solid rgba(255,255,255,.2);flex-shrink:0}
.sp.a .sd{background:var(--ac);color:var(--pd);border-color:var(--ac)}.sp.d .sd{background:var(--ok);border-color:var(--ok);color:#fff}
.sl{width:18px;height:2px;background:rgba(255,255,255,.12);flex-shrink:0}

.mn{max-width:960px;margin:0 auto;padding:28px 20px 80px}
.cd{background:var(--card);border-radius:var(--rl);box-shadow:var(--sh);border:1px solid var(--bd);padding:28px;margin-bottom:20px;animation:ci .35s ease both}
@keyframes ci{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ct{font-family:'Cairo',sans-serif;font-size:18px;font-weight:800;color:var(--p);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.ct i{width:34px;height:34px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:9px;display:grid;place-items:center;color:#fff;font-size:16px;font-style:normal}
.cs{color:var(--tx2);font-size:13px;margin-bottom:22px;padding-right:44px}

.fg{margin-bottom:18px}
.fl{display:block;font-weight:700;font-size:13.5px;color:var(--tx);margin-bottom:6px}
.fl .rq{color:var(--no);margin-right:2px}
.fl .ht{font-size:11.5px;color:var(--tx2);font-weight:400;margin-right:4px}
.fi,.fs,.ft{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:14px;color:var(--tx);background:var(--bg);transition:var(--t);direction:rtl}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--pl);background:#fff;box-shadow:0 0 0 3px rgba(26,127,168,.08)}
.ft{min-height:90px;resize:vertical;line-height:1.9}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

.dl{display:flex;flex-direction:column;gap:10px}
.di{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;gap:10px;align-items:flex-start;animation:ci .25s ease both}
.dn{width:26px;height:26px;background:var(--p);color:#fff;border-radius:7px;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:2px}
.db{flex:1;display:flex;flex-direction:column;gap:7px}
.db input,.db textarea,.db select{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:7px;font-family:'Tajawal',sans-serif;font-size:13px;background:#fff;direction:rtl}
.db input:focus,.db textarea:focus,.db select:focus{outline:none;border-color:var(--pl)}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.bx{background:none;border:none;color:var(--no);cursor:pointer;padding:2px;font-size:16px;opacity:.5;transition:var(--t)}
.bx:hover{opacity:1}
.ba{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;background:transparent;border:1.5px dashed var(--pl);border-radius:var(--r);color:var(--p);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--t);margin-top:6px}
.ba:hover{background:rgba(26,127,168,.05);border-color:var(--p)}

.as{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:20px;border-top:1px solid var(--bd)}
.bt{padding:10px 28px;border-radius:var(--r);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:var(--t);border:none;display:inline-flex;align-items:center;gap:7px}
.bp{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;box-shadow:0 3px 12px rgba(11,79,108,.25)}
.bp:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(11,79,108,.35)}
.bs{background:var(--bg);color:var(--tx);border:1.5px solid var(--bd)}
.bs:hover{background:#fff;border-color:var(--pl)}
.bg{background:linear-gradient(135deg,var(--ac),var(--al));color:var(--pd);box-shadow:0 3px 12px rgba(200,164,21,.25);font-size:15px;padding:12px 36px}
.bg:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(200,164,21,.35)}

.inf{background:rgba(26,127,168,.05);border:1px solid rgba(26,127,168,.12);border-radius:var(--r);padding:12px 16px;margin-bottom:18px;font-size:12.5px;color:var(--p);display:flex;gap:7px;align-items:flex-start}

.pp{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--p)}
.pn{background:var(--p);color:#fff;padding:3px 14px;border-radius:16px;font-weight:700;font-size:13px}

.pw{background:#fff;border:1.5px solid var(--bd);border-radius:var(--rl);padding:44px 40px;max-width:880px;margin:0 auto;direction:rtl;font-family:'Tajawal',sans-serif;line-height:2}
.pw h1{font-family:'Cairo',sans-serif;color:var(--p);font-size:24px;text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid var(--ac)}
.pw h2{font-family:'Cairo',sans-serif;color:var(--p);font-size:18px;margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--bd)}
.pw h3{color:var(--pl);font-size:15px;margin:14px 0 6px}
.pw table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.pw th{background:var(--p);color:#fff;padding:8px 10px;font-weight:600}
.pw td{padding:7px 10px;border:1px solid var(--bd)}
.pw tr:nth-child(even){background:var(--bg)}
.pw ul{padding-right:22px}
.pw li{margin-bottom:4px}

.da{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:20px 0}

.wl{text-align:center;padding:50px 20px}
.wi{width:90px;height:90px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:22px;display:grid;place-items:center;margin:0 auto 22px;font-size:42px;color:#fff;box-shadow:0 10px 30px rgba(11,79,108,.2)}
.wl h2{font-family:'Cairo',sans-serif;font-size:26px;color:var(--p);margin-bottom:10px}
.wl>p{color:var(--tx2);font-size:15px;max-width:580px;margin:0 auto 28px;line-height:1.9}
.fg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:660px;margin:0 auto 28px}
.ft-c{background:var(--bg);border-radius:var(--r);padding:18px;text-align:center}
.ft-c .ic{font-size:26px;margin-bottom:6px}
.ft-c h4{color:var(--p);font-size:13px;margin-bottom:3px}
.ft-c p{font-size:11.5px;color:var(--tx2);margin:0}

.nt{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 22px;border-radius:var(--r);font-weight:600;font-size:13px;box-shadow:0 12px 40px rgba(0,0,0,.15);z-index:2000;animation:ni .3s ease both}
@keyframes ni{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.lo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;z-index:1000;backdrop-filter:blur(3px)}
.lb{background:#fff;border-radius:var(--rl);padding:40px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.sn{width:40px;height:40px;border:3.5px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}

.fo{text-align:center;padding:20px;color:var(--tx2);font-size:12.5px;border-top:1px solid var(--bd);margin-top:36px}
.fo strong{color:var(--p)}

@media(max-width:768px){
.hd-top{padding:10px 14px}.br h1{font-size:15px}.hd-tag{display:none}
.sb{padding:0 14px}.sp span:not(.sd){display:none}.sp{padding:8px 10px}
.mn{padding:14px 10px 60px}.cd{padding:18px 14px}
.fr2,.fr3,.dg2,.dg3{grid-template-columns:1fr}
.pw{padding:20px 14px}.as{flex-direction:column;gap:10px}.as .bt{width:100%;justify-content:center}
.fg-grid{grid-template-columns:1fr}.wl{padding:30px 14px}
}
@media print{.hd,.sb,.as,.da,.bt,.fo,.nt{display:none!important}.mn{padding:0;max-width:100%}.cd{box-shadow:none;border:none;padding:0;margin:0}.pw{border:none;padding:20px;box-shadow:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const S={
  step:0,loading:false,notif:'',
  p:{pName:'',pNum:'',gov:'',cons:'',dCons:'',bCost:'',bVAT:'',sDate:'',wsS:'',wsE:'',wsD:'3',dPhase:'',pIntro:'',pScope:'',pType:''},
  team:[{n:'',e:'',r:'',s:'',ph:'',em:''}],
  docs:[{n:''}],
  attrs:[{n:'',l:'8'}],
  funcs:[{el:'',fn:'',cl:''}],
  pFn:[''],
  ideas:[{nu:'',de:'',ev:''}],
  props:[{nu:'VE-01',ti:'',cur:'',nw:'',pro:'',con:'',ci:'',it:'تفادي تكلفة',af:'1.0',ar:'',pi:'',rk:''}],
  costs:[{n:'',c:''}],
};

const STP=[{l:'البداية'},{l:'بيانات المشروع'},{l:'الفريق والوثائق'},{l:'التحليل والنماذج'},{l:'الأفكار والتقييم'},{l:'المقترحات'},{l:'المعاينة والتصدير'}];

const E=s=>s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
const FN=n=>n?Number(n).toLocaleString('ar-SA'):'-';
const FD=d=>d?new Date(d).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}):'___/___/______';
function FI(el){let v=el.value.replace(/[^\d.]/g,'');if(v){const p=v.split('.');p[0]=parseInt(p[0]).toLocaleString('en');el.value=p.join('.')}}
function NT(m){S.notif=m;R();setTimeout(()=>{S.notif='';R()},3500)}
function SF(){['pName','pNum','gov','cons','dCons','bCost','bVAT','sDate','wsS','wsE','wsD','dPhase','pIntro','pScope','pType'].forEach(f=>{const e=document.getElementById(f);if(e)S.p[f]=e.value})}
function GO(s){SF();S.step=s;R();scrollTo(0,0)}
function NX(s){SF();S.step=s;if(s===6){S.loading=true;R();setTimeout(()=>{S.loading=false;R();scrollTo(0,0)},1500)}else{R();scrollTo(0,0)}}
function AD(a,o){a.push(o);R()}
function RM(a,i){a.splice(i,1);R()}
function UP(a,i,k,v){a[i][k]=v}

// ====== AUTO GENERATION ENGINE ======
function autoGen(){
  const d=S.p;
  const pn=d.pName||'المشروع';
  const gov=d.gov||'الجهة الحكومية';
  const bc=parseFloat((d.bCost||'0').replace(/,/g,''));
  const pt=d.pType||'إنشائي';

  // Auto-generate cost items if empty
  if(S.costs.length===1&&!S.costs[0].n){
    if(pt==='إنشائي'||pt==='بنية تحتية'){
      S.costs=[
        {n:'أعمال الخرسانة والهيكل الإنشائي',c:Math.round(bc*0.30).toLocaleString('en')},
        {n:'أعمال التشطيبات والتكسيات',c:Math.round(bc*0.15).toLocaleString('en')},
        {n:'الأعمال الكهربائية',c:Math.round(bc*0.12).toLocaleString('en')},
        {n:'الأعمال الميكانيكية والتكييف',c:Math.round(bc*0.14).toLocaleString('en')},
        {n:'أعمال الموقع والبنية التحتية',c:Math.round(bc*0.10).toLocaleString('en')},
        {n:'الأعمال الصحية والسباكة',c:Math.round(bc*0.08).toLocaleString('en')},
        {n:'أعمال الحماية من الحريق',c:Math.round(bc*0.05).toLocaleString('en')},
        {n:'أعمال أخرى ومصاريف عامة',c:Math.round(bc*0.06).toLocaleString('en')},
      ];
    } else {
      S.costs=[
        {n:'أعمال البند الرئيسي الأول',c:Math.round(bc*0.35).toLocaleString('en')},
        {n:'أعمال البند الرئيسي الثاني',c:Math.round(bc*0.25).toLocaleString('en')},
        {n:'أعمال البند الرئيسي الثالث',c:Math.round(bc*0.20).toLocaleString('en')},
        {n:'أعمال إضافية ومصاريف عامة',c:Math.round(bc*0.20).toLocaleString('en')},
      ];
    }
  }

  // Auto-generate performance attributes if empty
  if(S.attrs.length===1&&!S.attrs[0].n){
    S.attrs=[
      {n:'كفاءة الأداء الوظيفي',l:'9'},
      {n:'الاستدامة وكفاءة الطاقة',l:'8'},
      {n:'السلامة والأمان',l:'10'},
      {n:'سهولة الصيانة والتشغيل',l:'8'},
      {n:'الجودة والمتانة',l:'9'},
      {n:'المرونة والتوسع المستقبلي',l:'7'},
    ];
  }

  // Auto-generate functions if empty
  if(S.funcs.length===1&&!S.funcs[0].el){
    S.funcs=[
      {el:'المبنى الرئيسي',fn:'يوفر المساحات',cl:'أساسية'},
      {el:'النظام الإنشائي',fn:'يتحمل الأحمال',cl:'أساسية'},
      {el:'نظام التكييف',fn:'يضبط الحرارة',cl:'أساسية'},
      {el:'النظام الكهربائي',fn:'يوزع الطاقة',cl:'أساسية'},
      {el:'شبكة السباكة',fn:'ينقل المياه',cl:'أساسية'},
      {el:'أعمال التشطيب',fn:'يحسّن المظهر',cl:'ثانوية'},
      {el:'نظام الحريق',fn:'يحمي الأرواح',cl:'أساسية'},
      {el:'أعمال الموقع',fn:'يهيئ البيئة',cl:'ثانوية'},
      {el:'العزل المائي',fn:'يمنع التسرب',cl:'مطلوبة'},
      {el:'التصميم المعماري',fn:'يلبي الاحتياج',cl:'أساسية'},
    ];
  }

  // Auto-generate priority functions if empty
  if(S.pFn.length===1&&!S.pFn[0]){
    S.pFn=['يتحمل الأحمال (النظام الإنشائي)','يضبط الحرارة (نظام التكييف)','يوزع الطاقة (النظام الكهربائي)'];
  }

  // Auto-generate ideas if empty
  if(S.ideas.length===1&&!S.ideas[0].de){
    S.ideas=[
      {nu:'01',de:'استخدام مواد بناء محلية الصنع بدلاً من المستوردة لتقليل التكلفة وتطبيق آلية المحتوى المحلي',ev:'A'},
      {nu:'02',de:'تحسين نظام التكييف باستخدام وحدات ذات كفاءة طاقة أعلى وفق معايير الاستدامة',ev:'A'},
      {nu:'03',de:'إعادة تصميم شبكة الصرف لتقليل أطوال المواسير وتبسيط المسارات',ev:'B'},
      {nu:'04',de:'استخدام خرسانة مسبقة الصب بدلاً من الصب الموقعي لتسريع التنفيذ',ev:'B'},
      {nu:'05',de:'تعديل مواصفات التشطيبات الداخلية لاستخدام بدائل اقتصادية بنفس الجودة',ev:'A'},
      {nu:'06',de:'دمج بعض الفراغات متعددة الاستخدام لتقليل المساحة الإجمالية',ev:'C'},
      {nu:'07',de:'تغيير نوع العزل الحراري إلى مادة أعلى كفاءة وأقل تكلفة',ev:'B'},
      {nu:'08',de:'إلغاء بعض العناصر الزخرفية غير الوظيفية في الواجهات',ev:'C'},
      {nu:'09',de:'استخدام إضاءة LED موفرة بدلاً من الإضاءة التقليدية',ev:'A'},
      {nu:'10',de:'تعديل تصميم المواقف لزيادة الكفاءة وتقليل أعمال الحفر',ev:'D'},
      {nu:'11',de:'استخدام أنظمة تحكم ذكية مركزية لإدارة المبنى',ev:'C'},
      {nu:'12',de:'تقليل عدد المصاعد مع زيادة سعة المصاعد المتبقية',ev:'D'},
    ];
  }

  // Auto-generate proposals if empty
  if(S.props.length===1&&!S.props[0].ti){
    const devIdeas=S.ideas.filter(i=>['A','B'].includes(i.ev));
    S.props=[];
    const propTemplates=[
      {
        nu:'VE-01',ti:'استخدام مواد بناء محلية الصنع',
        cur:'يعتمد التصميم الحالي على استخدام مواد بناء متنوعة المصادر، بما في ذلك مواد مستوردة من الخارج لعدد من البنود الإنشائية والتشطيبات، مما يرفع التكلفة ويزيد مدة التوريد.',
        nw:'استبدال المواد المستوردة بمواد بناء محلية الصنع معتمدة ومطابقة للمواصفات الفنية المطلوبة، وذلك لكامل بنود المشروع حسب توفرها في الأسواق المحلية، تماشياً مع التعميمات الوزارية لتطبيق آلية المحتوى المحلي.',
        pro:'تقليل تكلفة التوريد بنسبة تقديرية 8-12%\nتقصير مدة التوريد وتسريع التنفيذ\nدعم الصناعة المحلية وتطبيق آلية المحتوى المحلي\nسهولة توفير قطع الغيار والصيانة مستقبلاً\nتقليل المخاطر المرتبطة بالشحن والجمارك',
        con:'قد تكون بعض المواد المحلية أقل في المتانة مقارنة بالمستوردة في حالات محدودة\nيتطلب التحقق من مطابقة المواصفات الفنية لكل بند',
        ci:Math.round(bc*0.06).toLocaleString('en'),it:'تفادي تكلفة',af:'1.0',ar:'',
        pi:'إيجابي - المواد المحلية تلبي متطلبات الأداء المحددة وتتوافق مع المواصفات الفنية، مع تحسن في سهولة الصيانة والتشغيل',

// ====== CHART GENERATORS ======
function pieChart(items,bc){
  if(!items.length||!bc)return '';
  const colors=['#0B4F6C','#1A7FA8','#2196F3','#4CAF50','#FF9800','#E91E63','#9C27B0','#00BCD4','#795548','#607D8B'];
  let total=0;items.forEach(c=>{total+=parseFloat((c.c||'0').replace(/,/g,''))});
  if(!total)return '';
  let angle=0;const cx=150,cy=150,r=130;
  let paths='',legends='';
  items.forEach((c,i)=>{
    const v=parseFloat((c.c||'0').replace(/,/g,''));
    const pct=v/total;const a=pct*360;
    const sr=angle*Math.PI/180;const er=(angle+a)*Math.PI/180;
    const la=a>180?1:0;
    const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr);
    const x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${la},1 ${x2},${y2} Z" fill="${colors[i%colors.length]}" stroke="#fff" stroke-width="2"/>`;
    const mid=(angle+a/2)*Math.PI/180;
    const tx=cx+(r*0.65)*Math.cos(mid),ty=cy+(r*0.65)*Math.sin(mid);

    angle+=a;
  });

}

function barChart(items,bc){
  if(!items.length||!bc)return '';
  const colors=['#0B4F6C','#E91E63','#9E9E9E','#4CAF50','#FF9800','#2196F3','#9C27B0','#00BCD4'];

  if(!maxV)return '';
  const bh=32,gap=8,w=600,pad=140;

  let bars='';
  items.forEach((c,i)=>{

function radarChart(attrs){
  const items=attrs.filter(a=>a.n);
  if(!items.length)return '';
  const cx=200,cy=200,r=150,n=items.length;
  const angleStep=2*Math.PI/n;
  let gridLines='',labels='',dataPath='',dataPath2='';
  for(let ring=2;ring<=10;ring+=2){
    const rr=r*(ring/10);let pts=[];
    for(let i=0;i<n;i++){const a=-Math.PI/2+i*angleStep;pts.push(`${cx+rr*Math.cos(a)},${cy+rr*Math.sin(a)}`);}
    gridLines+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#ddd" stroke-width="1"/>`;
  }
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+i*angleStep;
    const lx=cx+(r+25)*Math.cos(a),ly=cy+(r+25)*Math.sin(a);
    gridLines+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="#ddd" stroke-width="1"/>`;
    labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-family="Tajawal" fill="#333">${E(items[i].n)}</text>`;
  }
  let pts1=[],pts2=[];
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+i*angleStep;
    const v=parseInt(items[i].l)||5;
    const rr=r*(v/10);
    pts1.push(`${cx+rr*Math.cos(a)},${cy+rr*Math.sin(a)}`);
    const v2=Math.max(v-2,1);const rr2=r*(v2/10);
    pts2.push(`${cx+rr2*Math.cos(a)},${cy+rr2*Math.sin(a)}`);
  }
  dataPath=`<polygon points="${pts1.join(' ')}" fill="rgba(11,79,108,0.25)" stroke="#0B4F6C" stroke-width="2.5"/>`;
  dataPath2=`<polygon points="${pts2.join(' ')}" fill="rgba(200,164,21,0.15)" stroke="#C8A415" stroke-width="2" stroke-dasharray="6,3"/>`;
  const scaleLabels=[2,4,6,8,10].map(v=>`<text x="${cx+4}" y="${cy-r*(v/10)+3}" font-size="9" fill="#999" font-family="Tajawal">${v}</text>`).join('');
  return `<div style="text-align:center;margin:20px 0"><h3 style="margin-bottom:6px">منحنى الجودة — سمات الأداء</h3><p style="font-size:13px;margin-bottom:12px">يوضح الشكل التالي منحنى جودة يعرض مستويات الأداء المستهدفة لكل سمة تم تحديدها بالتنسيق مع ممثلي الجهة الحكومية.</p><div style="display:flex;justify-content:center;gap:20px;align-items:center;flex-wrap:wrap"><svg viewBox="0 0 400 440" width="380" style="max-width:100%">${gridLines}${dataPath2}${dataPath}${labels}${scaleLabels}</svg><div style="display:flex;flex-direction:column;gap:8px;font-size:12px"><div style="display:flex;align-items:center;gap:6px"><div style="width:30px;height:3px;background:#0B4F6C"></div><span>منحنى الجودة</span></div><div style="display:flex;align-items:center;gap:6px"><div style="width:30px;height:3px;background:#C8A415;border-top:2px dashed #C8A415"></div><span>الاستجابة المتوازنة</span></div></div></div></div>`;
}

<h2>1. الملخص التنفيذي</h2>
<h3>1-1 مقدمة</h3>
<p>يلخص هذا التقرير أنشطة دراسة الهندسة القيمية التي تم تنفيذها لصالح <strong>${E(gov)}</strong>، بقيادة <strong>${E(cons)}</strong>. وتغطي الدراسة مشروع <strong>${E(pn)}</strong>، فيما امتدت ورشة العمل على مدى <strong>${d.wsD||'3'}</strong> أيام خلال الفترة من <strong>${FD(d.wsS)}</strong> إلى <strong>${FD(d.wsE)}</strong>.</p>
<p>وقد أعدّ تصميم المشروع <strong>${E(dCons)}</strong> في حين أُجريت دراسة الهندسة القيمية خلال مرحلة <strong>${d.dPhase||'التصميم التفصيلي'}</strong>.</p>
<p>وتهدف دراسة الهندسة القيمية إلى:</p>
<ul><li>تطبيق مبادئ ومراحل خطة عمل الهندسة القيمية وفق منهجية SAVE International.</li><li>إجراء مراجعة وتحليل شامل للعناصر الرئيسية باستخدام فريق متعدد التخصصات من خلال تحليل الوظائف.</li><li>البحث عن أفكار متنوعة لتحسين القيمة وتحقيق أهداف المشروع.</li><li>تطبيق تقنيات تقييم مهنية على الأفكار المطروحة وفقًا لمنهجية الهندسة القيمية.</li><li>تحديد الفرص الممكنة لإضافة قيمة وتحقيق تفادي في التكاليف.</li><li>تطوير الأفكار الواعدة بما يُسهم في تحسين ممارسات التصميم وتوجيه المراحل التالية.</li></ul>

<h3>1-2 ملخص دراسة الهندسة القيمية</h3>
<p>أُجريت دراسة الهندسة القيمية لتعظيم قيمة المشروع بتحسين الأداء وترشيد استخدام الموارد. وقد أسفرت الدراسة عن تحقيق <strong>تفادي تكاليف محتمل</strong> بقيمة <strong>${FN(tA.toFixed(0))} ريال سعودي</strong>، وهو ما يمثل نسبة <strong>${aP}%</strong> من التكلفة الأساسية للمشروع.</p>

<h3>1-3 ملخص الأثر المالي للمقترحات</h3>
<p>يُبيّن الجدول أدناه الأثر المالي المحتمل للمقترحات المطوّرة خلال دراسة الهندسة القيمية، حيث تم تصنيف كل مقترح إما كتفادي في التكلفة أو كتكلفة إضافية مرتبطة بتحسين القيمة. ولضمان سيناريو واقعي، تم تطبيق معاملات تعديل تعكس حالات التداخل الفني بين المقترحات.</p>
<table><tr><th>م</th><th>رقم المقترح</th><th>التصنيف</th><th>الأثر المالي</th><th>المعامل</th><th>المبرر</th><th>المعدّل</th></tr>
${S.props.map((p,i)=>{const im=parseFloat((p.ci||'0').replace(/,/g,''));const f=parseFloat(p.af||'1');return `<tr><td>${i+1}</td><td>${E(p.nu)}</td><td>${E(p.it)}</td><td>${FN(im)}</td><td>${f}</td><td>${E(p.ar)||'-'}</td><td>${FN((im*f).toFixed(0))}</td></tr>`}).join('')}
<tr style="background:#0B4F6C;color:#fff;font-weight:700"><td colspan="6">مجموع تفادي التكاليف المحتمل</td><td>${FN(tA.toFixed(0))} ريال</td></tr>
<tr style="font-weight:700"><td colspan="6">مجموع التكاليف الإضافية</td><td>${FN(tAd.toFixed(0))} ريال</td></tr>
<tr style="font-weight:700"><td colspan="6">التكلفة الأساسية (بدون ضريبة)</td><td>${FN(bc)} ريال</td></tr>
<tr style="background:#C8A415;font-weight:700"><td colspan="6">نسبة تفادي التكاليف</td><td>${aP}%</td></tr></table>

<h3>1-5 فريق الهندسة القيمية</h3>
<p>يُعد وجود فريق هندسة قيمية مكوَّن من كوادر ذات خبرة ومعرفة عالية من أهم عوامل نجاح ورشة العمل.</p>
<table><tr><th>#</th><th>الاسم</th><th>الجهة</th><th>الوظيفة</th><th>التخصص</th></tr>
${S.team.map((m,i)=>`<tr><td>${i+1}</td><td>${E(m.n)||'-'}</td><td>${E(m.e)||'-'}</td><td>${E(m.r)||'-'}</td><td>${E(m.s)||'-'}</td></tr>`).join('')}</table>

<h2>2. نظرة عامة عن المشروع</h2>
<h3>2-1 مقدمة عن المشروع</h3>
<p>${E(intro)}</p>
<h3>2-2 نطاق عمل المشروع وموقعه</h3>
<p>${E(scope)}</p>
<h3>2-3 الوثائق والمستندات المرجعية</h3>
<p>استلم فريق دراسة الهندسة القيمية مجموعة من الوثائق والمستندات الفنية من فريق التصميم، والتي تم الاعتماد عليها لفهم المشروع وتحليل عناصره:</p>
<table><tr><th>#</th><th>المستند</th></tr>${docsDefault.map((dd,i)=>`<tr><td>${i+1}</td><td>${E(dd.n)||'-'}</td></tr>`).join('')}</table>

<h2>3. خطة عمل الهندسة القيمية</h2>
<p>تُعتبر مراحل خطة العمل العمود الفقري لتطبيق منهجية الهندسة القيمية، حيث تمثل تسلسلًا منطقيًا من الخطوات يضمن تحقيق أقصى استفادة. يُعد الالتزام بهذه المراحل أمرًا ضروريًا لضمان التطبيق الصحيح للمنهجية.</p>
<h3>3-1 مرحلة الإعداد</h3>
<p>مرحلة الإعداد تُعد حجر الأساس لنجاح الدراسة، حيث تُحدد الإطار العام وتُهيئ الظروف لتحقيق أقصى استفادة ممكنة. وتشمل: تحديد أهداف وغايات الدراسة، تحديد أعضاء الفريق من ممثلي ${E(gov)} والمعنيين بالمشروع وفريق التصميم وخبراء مستقلين، وضع الأجندة، والتنسيقات اللوجستية اللازمة.</p>
<p>خلال هذه المرحلة تم جمع المعلومات ومراجعتها بدقة لضمان فهم شامل للمشروع. كما عُقدت اجتماعات تمهيدية قبل ورشة العمل لتخطيط الجهود وتنظيمها بمشاركة ممثلي الجهة.</p>
<h3>3-2 ورشة عمل الهندسة القيمية</h3>
<p>تغطي ورشة العمل المراحل من عرض وتحليل المعلومات إلى عرض المقترحات، وتشمل: مرحلة عرض وتحليل المعلومات، مرحلة تحليل الوظائف، مرحلة طرح الأفكار، مرحلة التقييم، مرحلة التطوير، ومرحلة العرض.</p>
<p>وتهدف الورشة إلى تحليل وظائف المشروع وتوليد مقترحات تعزز القيمة من خلال الاستخدام الأمثل للموارد المتاحة، بما يضمن تحقيق الوظائف المطلوبة وفق مستويات الأداء المستهدفة.</p>

<h2>4. تحليل المعلومات وإعداد النماذج</h2>
<p>تُستخدم في دراسة الهندسة القيمية العديد من الأدوات والنماذج لتحليل معلومات المشروع وتوثيق التفاعل بين أعضاء الفريق. استنادًا إلى البيانات الفنية التي قدّمها فريق التصميم، قام فريق الهندسة القيمية بإعداد النماذج التالية:</p>

<h3>4-1 نماذج تحليل التكاليف</h3>
<p>يوضح الجدول التالي توزيع تكاليف المشروع على البنود الرئيسية، مما يتيح رؤية شاملة لتركيبة التكاليف ويساعد في تحديد البنود ذات التأثير الأكبر على الميزانية:</p>
<table><tr><th>البند</th><th>التكلفة (ريال)</th><th>النسبة</th></tr>
${S.costs.filter(c=>c.n).map(c=>{const cv=parseFloat((c.c||'0').replace(/,/g,''));return `<tr><td>${E(c.n)}</td><td>${FN(cv)}</td><td>${bc>0?((cv/bc)*100).toFixed(1):'0'}%</td></tr>`}).join('')}
<tr style="background:#0B4F6C;color:#fff;font-weight:700"><td>الإجمالي</td><td>${FN(bc)}</td><td>100%</td></tr></table>

${barChart(S.costs.filter(c=>c.n),bc)}
${pieChart(S.costs.filter(c=>c.n),bc)}

<h3>4-2 سمات الأداء ونموذج الجودة</h3>
<p>تم تحديد سمات الأداء بالتعاون مع ممثلي ${E(gov)}، بهدف توضيح الخصائص التي تعكس تطلعات الجهة وتدعم تحقيق أهداف المشروع:</p>
<table><tr><th>سمة الأداء</th><th>المستوى المستهدف (من 10)</th></tr>
${S.attrs.filter(a=>a.n).map(a=>`<tr><td>${E(a.n)}</td><td style="text-align:center;font-weight:700">${a.l}</td></tr>`).join('')}</table>

${radarChart(S.attrs)}

<h2>5. مرحلة تحليل الوظائف</h2>
<p>تهدف مرحلة تحليل الوظائف إلى تحديد الغرض الرئيسي من المشروع ومكوناته، وتُتيح فرصة لفتح آفاق جديدة في التفكير وتطوير مقترحات مبتكرة. وتتبع ثلاث خطوات: تعريف الوظائف وتصنيفها، تخصيص الموارد للوظائف، وتحديد الوظائف ذات الأولوية.</p>
<h3>قائمة التحديد العشوائي للوظائف</h3>
<table><tr><th>م</th><th>عنصر المشروع</th><th>الوظيفة (فعل + اسم)</th><th>التصنيف</th></tr>
${S.funcs.filter(f=>f.el).map((f,i)=>`<tr><td>${i+1}</td><td>${E(f.el)}</td><td>${E(f.fn)}</td><td>${E(f.cl)}</td></tr>`).join('')}</table>

${fastDiagram(S.funcs.filter(f=>f.el))}
${S.pFn.filter(p=>p).length?`<h3>الوظائف ذات الأولوية</h3><p>بناءً على تحليل الوظائف ومناقشات الفريق، تم تحديد الوظائف التالية كأولويات لمرحلة طرح الأفكار:</p><ul>${S.pFn.filter(p=>p).map(p=>`<li><strong>${E(p)}</strong></li>`).join('')}</ul>`:''}

<h2>6. مرحلة طرح الأفكار</h2>
<p>تأتي هذه المرحلة بعد الانتهاء من تحليل الوظائف وتحديد الأولويات. وقد تم استخدام تقنية العصف الذهني لتحفيز التفكير الحر، عبر توفير بيئة تفاعلية تتيح للفريق طرح الأفكار دون قيود. وقد نتج عن هذه المرحلة <strong>${S.ideas.length}</strong> فكرة:</p>
<table><tr><th>م</th><th>الرقم</th><th>وصف الفكرة</th></tr>
${S.ideas.map((id,i)=>`<tr><td>${i+1}</td><td>${E(id.nu)}</td><td>${E(id.de)}</td></tr>`).join('')}</table>

<h2>7. مرحلة التقييم</h2>
<h3>7-1 تقنية التقييم</h3>
<p>تم تحديد معايير التقييم بما يتماشى مع طبيعة المشروع وأهداف الدراسة، وتمت مناقشتها مع ${E(gov)} لضمان توافقها مع متطلبات المشروع. استخدم الفريق أسلوب التقييم بالرموز الحرفية (Letter Grade Evaluation):</p>
${evalTable()}
<h3>7-2 نتائج مرحلة التقييم</h3>
<table><tr><th>م</th><th>الرقم</th><th>وصف الفكرة</th><th>التقييم</th></tr>
${S.ideas.map((id,i)=>`<tr><td>${i+1}</td><td>${E(id.nu)}</td><td>${E(id.de)}</td><td style="font-weight:700;color:${id.ev==='D'?'#DC2626':'#0D9668'};font-size:16px">${id.ev||'-'}</td></tr>`).join('')}</table>
<p>وبذلك تم اعتماد <strong>${dI.length}</strong> فكرة للتطوير (A, B, C)، واستبعاد <strong>${xI.length}</strong> فكرة حصلت على تقييم D.</p>

<h2>8. مرحلة التطوير</h2>
<p>يعمل فريق الهندسة القيمية في هذه المرحلة على تحويل الأفكار المختارة إلى مقترحات أكثر نضجًا وتفصيلًا. وقد نتج عن مرحلة طرح الأفكار ما مجموعه <strong>${S.ideas.length}</strong> فكرة، وتم اختيار <strong>${dI.length}</strong> فكرة لتطويرها. يتضمن كل مقترح: ملخصًا للتصميم الأساسي، ووصفًا للبديل المقترح، وقائمة بالإيجابيات والسلبيات، ومقارنة للتكاليف، وتحليلًا لأثر الأداء والمخاطر.</p>

${S.props.map(p=>veProposalCard(p,pn)).join('')}
`}
